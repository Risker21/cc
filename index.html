<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mo运势</title>
    <link rel="icon" href="https://momo21.online/wp-content/themes/creatorspc/static/favicon/tapedotpink_logo_96x96.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bd00ff;
            --neon-gold: #ffd700;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            cursor: none; /* Hide default cursor */
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            perspective: 1000px;
        }

        /* --- Canvas Background --- */
        #bgCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* --- Custom Cursor --- */
        .cursor {
            position: fixed; width: 20px; height: 20px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            mix-blend-mode: difference;
        }
        .cursor.hovered {
            width: 50px; height: 50px;
            background-color: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-pink);
        }
        .cursor-dot {
            position: fixed; width: 4px; height: 4px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
        }

        /* --- Main Container --- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* --- Character (Mascot) --- */
        .mascot-container {
            position: relative;
            width: 200px; height: 200px;
            margin-bottom: 2rem;
            cursor: pointer;
            z-index: 30;
            animation: floatMascot 4s ease-in-out infinite;
        }

        @keyframes floatMascot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .mascot-head {
            width: 140px; height: 140px;
            background: radial-gradient(circle at 30% 30%, #2a2a3a, #0f0f15);
            border: 2px solid var(--neon-cyan);
            border-radius: 45% 45% 40% 40%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s, border-color 0.3s;
            overflow: hidden;
        }

        .mascot-container:hover .mascot-head {
            transform: translate(-50%, -55%) scale(1.05);
            box-shadow: 0 0 60px rgba(0, 243, 255, 0.6);
            border-color: var(--neon-pink);
        }

        .face-screen {
            position: absolute; top: 15%; left: 10%; width: 80%; height: 60%;
            background: #000;
            border-radius: 20px;
            box-shadow: inset 0 0 10px var(--neon-cyan);
            overflow: hidden;
        }

        .eye {
            position: absolute; top: 35%;
            width: 25px; height: 35px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: height 0.1s;
        }
        .eye.left { left: 20%; }
        .eye.right { right: 20%; }
        
        .mascot-container:active .eye { height: 5px; top: 50%; } /* Blink on click */

        .mouth {
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
            width: 20px; height: 4px; background: var(--neon-cyan);
            border-radius: 2px;
            transition: width 0.3s, height 0.3s, border-radius 0.3s;
        }
        
        .mascot-container:hover .mouth {
            width: 30px; height: 15px; border-radius: 0 0 15px 15px;
        }

        /* Ears/Antenna */
        .ear {
            position: absolute; top: 10px;
            width: 20px; height: 40px;
            background: #1a1a20;
            border: 1px solid var(--neon-pink);
            z-index: -1;
            transition: transform 0.3s;
        }
        .ear.left { left: 20px; transform: rotate(-15deg); border-radius: 10px 0 0 0; }
        .ear.right { right: 20px; transform: rotate(15deg); border-radius: 0 10px 0 0; }
        
        .mascot-container:hover .ear.left { transform: rotate(-25deg) translateY(-5px); }
        .mascot-container:hover .ear.right { transform: rotate(25deg) translateY(-5px); }

        /* Speech Bubble */
        .bubble {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%) scale(0);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-cyan);
            padding: 1rem 1.5rem;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid;
            border-color: rgba(255, 255, 255, 0.1) transparent transparent transparent;
        }
        .bubble.show { opacity: 1; transform: translateX(-50%) scale(1); top: -110px; }

        /* --- Interaction Hint --- */
        .hint-text {
            margin-top: 1rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            letter-spacing: 2px;
            animation: pulseText 2s infinite;
        }
        @keyframes pulseText { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        /* --- Zodiac Selector --- */
        .zodiac-selector {
            position: absolute; top: 20px; right: 20px;
            z-index: 100;
            display: flex; gap: 10px; align-items: center;
        }
        select {
            background: rgba(0, 0, 0, 0.5);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
            outline: none;
            cursor: pointer;
        }
        select option {
            background: #000;
            color: white;
        }

        /* --- Header / Title --- */
        .glitch-wrapper {
            margin-bottom: 8rem;
            text-align: center;
            z-index: 20;
        }
        
        .glitch {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            color: white;
            letter-spacing: 0.1em;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .glitch::before {
            left: 2px; text-shadow: -2px 0 var(--neon-pink);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-1 3s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px; text-shadow: -2px 0 var(--neon-cyan);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(14px, 9999px, 122px, 0); }
            5% { clip: rect(82px, 9999px, 34px, 0); }
            10% { clip: rect(10px, 9999px, 88px, 0); }
            15% { clip: rect(120px, 9999px, 10px, 0); }
            20% { clip: rect(65px, 9999px, 55px, 0); }
            100% { clip: rect(0, 0, 0, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(100px, 9999px, 10px, 0); }
            5% { clip: rect(20px, 9999px, 90px, 0); }
            10% { clip: rect(50px, 9999px, 30px, 0); }
            15% { clip: rect(10px, 9999px, 110px, 0); }
            20% { clip: rect(80px, 9999px, 40px, 0); }
            100% { clip: rect(0, 0, 0, 0); }
        }

        /* --- Confetti (Blessing Effect) --- */
        .confetti {
            position: absolute; width: 8px; height: 8px; background: var(--neon-gold);
            pointer-events: none;
            opacity: 0;
        }

        /* --- Footer --- */
        .status-bar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            color: var(--neon-cyan);
            z-index: 20;
        }
        
        .status-item { display: flex; align-items: center; gap: 0.5rem; }
        .status-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; box-shadow: 0 0 5px #0f0; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            .glitch { font-size: 2.5rem; }
            .mascot-container { width: 160px; height: 160px; }
            .mascot-head { width: 110px; height: 110px; }
            .status-bar { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <!-- Zodiac Selector -->
    <div class="zodiac-selector">
        <label for="zodiac-select" style="color: var(--neon-cyan); font-size: 0.9rem;">选择星座:</label>
        <select id="zodiac-select">
            <option value="aries">白羊座 (Aries)</option>
            <option value="taurus">金牛座 (Taurus)</option>
            <option value="gemini">双子座 (Gemini)</option>
            <option value="cancer">巨蟹座 (Cancer)</option>
            <option value="leo">狮子座 (Leo)</option>
            <option value="virgo">处女座 (Virgo)</option>
            <option value="libra">天秤座 (Libra)</option>
            <option value="scorpio">天蝎座 (Scorpio)</option>
            <option value="sagittarius">射手座 (Sagittarius)</option>
            <option value="capricorn">摩羯座 (Capricorn)</option>
            <option value="aquarius">水瓶座 (Aquarius)</option>
            <option value="pisces">双鱼座 (Pisces)</option>
        </select>
    </div>

    <div class="container">
        <!-- Title -->
        <div class="glitch-wrapper">
            <h1 class="glitch" data-text="momo">你好   探索者</h1>
        </div>

        <!-- Mascot Character -->
        <div class="mascot-container hover-trigger" id="mascot">
            <div class="bubble" id="bubble">你好呀！点击我获取今日好运~</div>
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="mascot-head">
                <div class="face-screen">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="mouth"></div>
                </div>
            </div>
        </div>

        <div class="hint-text" id="daily-fortune">今日运势：请选择星座查看...</div>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot"></div> SYSTEM ONLINE
        </div>
        <div class="status-item">
            VISITOR: <span id="visitor-id">LUCKY-001</span>
        </div>
        <div class="status-item">
            MOOD: <span id="system-mood">OPTIMISTIC</span>
        </div>
    </div>

    <script>
        // --- Cursor Logic ---
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        const hoverTriggers = document.querySelectorAll('.hover-trigger');

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;
        let dotX = mouseX;
        let dotY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        hoverTriggers.forEach(trigger => {
            trigger.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
            trigger.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
        });

        function animateCursor() {
            // Smooth follow
            const dt = 0.15;
            cursorX += (mouseX - cursorX) * dt;
            cursorY += (mouseY - cursorY) * dt;
            dotX += (mouseX - dotX) * 0.5; // Dot is faster
            dotY += (mouseY - dotY) * 0.5;

            cursor.style.left = `${cursorX}px`;
            cursor.style.top = `${cursorY}px`;
            cursorDot.style.left = `${dotX}px`;
            cursorDot.style.top = `${dotY}px`;

            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // --- Mascot Interaction (Eyes Follow & Click) ---
        const mascot = document.getElementById('mascot');
        const eyes = document.querySelectorAll('.eye');
        const bubble = document.getElementById('bubble');
        const moodSpan = document.getElementById('system-mood');
        const zodiacSelect = document.getElementById('zodiac-select');
        const dailyFortuneText = document.getElementById('daily-fortune');

        // Deterministic Random Function (Seeded by Date + String)
        function seededRandom(seed) {
            let h = 0xdeadbeef;
            for(let i = 0; i < seed.length; i++)
                h = Math.imul(h ^ seed.charCodeAt(i), 2654435761);
            h = ((h ^ h >>> 16) >>> 0);
            return h / 4294967296;
        }

        // Generate Daily Fortune based on Zodiac
        function updateDailyFortune() {
            const selectedZodiac = zodiacSelect.value;
            const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
            
            const fortuneLevels = ["大吉", "中吉", "小吉", "平", "末吉"];
            const luckyItems = ["咖啡", "耳机", "绿色植物", "书本", "阳光", "旧照片", "巧克力", "笔记本"];
            const luckyColors = ["霓虹蓝", "赛博粉", "极光绿", "钛金灰", "星空紫", "深海蓝"];
            
            // Generate seed: Date + Zodiac
            // If no zodiac selected, use a generic seed but vary by day
            const seedKey = selectedZodiac ? (today + selectedZodiac) : (today + "general");
            const rand1 = seededRandom(seedKey + "level");
            const rand2 = seededRandom(seedKey + "item");
            const rand3 = seededRandom(seedKey + "color");

            const level = fortuneLevels[Math.floor(rand1 * fortuneLevels.length)];
            const item = luckyItems[Math.floor(rand2 * luckyItems.length)];
            const color = luckyColors[Math.floor(rand3 * luckyColors.length)];

            if (selectedZodiac) {
                dailyFortuneText.innerText = `今日运势：${level} | 幸运物：${item} | 幸运色：${color}`;
                dailyFortuneText.style.color = "var(--neon-cyan)";
            } else {
                dailyFortuneText.innerText = "今日运势：请选择星座查看...";
                dailyFortuneText.style.color = "rgba(255,255,255,0.5)";
            }
        }

        // Listen for zodiac change
        zodiacSelect.addEventListener('change', updateDailyFortune);
        // Initialize
        updateDailyFortune();

        // Eye tracking
        document.addEventListener('mousemove', (e) => {
            const rect = mascot.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            const distance = Math.min(10, Math.hypot(e.clientX - centerX, e.clientY - centerY) / 20); // Limit eye movement
            
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;

            eyes.forEach(eye => {
                eye.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // Zodiac Fortunes (Mock Data)
        const zodiacFortunes = {
            aries: ["今日充满活力，适合挑战新事物！", "热情如火，你的行动力将带来好运。", "财运不错，可能会有意外之喜。", "今日不宜冲动，三思而后行。", "适合运动，释放多余的能量。"],
            taurus: ["稳扎稳打，你的坚持会有回报。", "享受生活，美食会治愈你的心情。", "财运亨通，适合理财规划。", "固执己见可能会错失良机。", "适合与大自然亲密接触。"],
            gemini: ["思维敏捷，灵感源源不断。", "沟通顺利，适合结交新朋友。", "好奇心会带你发现新大陆。", "注意力不集中可能会导致失误。", "适合阅读一本新书。"],
            cancer: ["温柔体贴，你的关怀会温暖他人。", "直觉敏锐，相信你的第一感觉。", "家庭和睦，幸福感爆棚。", "情绪波动较大，需要自我调节。", "适合在家做一顿美味的晚餐。"],
            leo: ["自信满满，你就是舞台的中心。", "领导力爆棚，适合带领团队冲刺。", "桃花运旺盛，魅力无法挡。", "过于强势可能会招致反感。", "适合参加社交活动。"],
            virgo: ["细节决定成败，你的严谨备受赞赏。", "效率极高，今日工作事半功倍。", "健康运势佳，保持良好作息。", "过于挑剔可能会得罪人。", "适合整理房间，断舍离。"],
            libra: ["优雅迷人，社交场合如鱼得水。", "平衡感强，能妥善处理复杂关系。", "艺术灵感迸发，适合创作。", "优柔寡断可能会错失良机。", "适合逛美术馆或听音乐会。"],
            scorpio: ["神秘莫测，你的洞察力令人惊叹。", "意志坚定，任何困难都难不倒你。", "财运偏好，直觉精准。", "嫉妒心作祟可能会破坏关系。", "适合独处思考，冥想。"],
            sagittarius: ["自由奔放，一场说走就走的旅行在等你。", "乐观开朗，好运自然来。", "学习运佳，适合拓展新知识。", "粗心大意可能会导致损失。", "适合户外运动，呼吸新鲜空气。"],
            capricorn: ["踏实肯干，你的努力终将被看见。", "事业运强，升职加薪指日可待。", "规划清晰，目标一步步实现。", "过于严肃可能会让人产生距离感。", "适合制定长期计划。"],
            aquarius: ["创意无限，你的脑洞能改变世界。", "独立自主，享受独处的时光。", "科技感十足，适合探索新工具。", "特立独行可能会不被理解。", "适合参加科技展或创新论坛。"],
            pisces: ["浪漫多情，你的梦想即将成真。", "同理心强，善解人意。", "灵感如泉涌，艺术天赋满点。", "逃避现实可能会导致问题堆积。", "适合写日记或绘画。"]
        };

        // General Blessings (Fallback)
        const generalBlessings = [
            "愿你的一天充满阳光和好运！",
            "接收来自未来的好运信号... 接收成功！",
            "祝你心想事成，万事如意！",
            "系统检测：你的快乐指数正在飙升！",
            "保持热爱，奔赴山海。加油！",
            "你是独一无二的，闪闪发光！",
            "今日运势：大吉！会有好事发生哦。",
            "愿你被这个世界温柔以待。",
            "能量充满！去创造属于你的奇迹吧。",
            "记得按时吃饭，照顾好自己哦。"
        ];

        // Click Handler
        mascot.addEventListener('click', (e) => {
            // 1. Determine Message Source
            const selectedZodiac = zodiacSelect.value;
            let message = "";
            
            if (selectedZodiac && zodiacFortunes[selectedZodiac]) {
                const fortunes = zodiacFortunes[selectedZodiac];
                message = `[${selectedZodiac.toUpperCase()}] ${fortunes[Math.floor(Math.random() * fortunes.length)]}`;
            } else {
                message = generalBlessings[Math.floor(Math.random() * generalBlessings.length)];
            }

            // 2. Show Message
            bubble.innerText = message;
            bubble.classList.add('show');
            
            // Auto hide bubble
            setTimeout(() => {
                bubble.classList.remove('show');
            }, 4000); // Slightly longer for zodiac messages

            // 3. Change Mood Text
            moodSpan.innerText = "PREDICTING...";
            setTimeout(() => moodSpan.innerText = "OPTIMISTIC", 1500);

            // 4. Confetti Explosion
            createConfetti(e.clientX, e.clientY);
        });

        function createConfetti(x, y) {
            const colors = ['#00f3ff', '#ff00ff', '#bd00ff', '#ffd700', '#ffffff'];
            for(let i=0; i<30; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                document.body.appendChild(conf);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 150 + 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                conf.style.left = `${x}px`;
                conf.style.top = `${y}px`;
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.transition = 'all 0.8s ease-out';
                
                // Force reflow
                conf.offsetHeight;

                conf.style.transform = `translate(${tx}px, ${ty}px) rotate(${Math.random()*360}deg)`;
                conf.style.opacity = 1;

                setTimeout(() => {
                    conf.style.opacity = 0;
                    setTimeout(() => conf.remove(), 800);
                }, 400);
            }
        }

        // --- Canvas Background (Matrix / Particle Flow) ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }
        
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5; 
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2;
                this.color = Math.random() > 0.5 ? '#00f3ff' : '#bd00ff';
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }

            update() {
                // Mouse interaction
                let dx = mouseX - this.x;
                let dy = mouseY - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = 250; 
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < maxDistance) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx/40; 
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy/40;
                    }
                }

                // Drift
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off edges
                if(this.x < 0 || this.x > width) this.vx *= -1;
                if(this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            let numberOfParticles = (width * height) / 10000; 
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 120) {
                        ctx.strokeStyle = `rgba(100, 100, 255, ${1 - distance/120})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
                particles[a].update();
                particles[a].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', resize);
        resize();
        animateParticles();

        document.getElementById('visitor-id').innerText = `LUCKY-${Math.floor(Math.random() * 9000) + 1000}`;
        
    </script>
</body>
</html>
